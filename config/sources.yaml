# RSS feeds for geopolitical news
# Intentionally excludes financial/markets sections
rss_feeds:
  # Wire services — hard news, minimal editorializing
  - name: "AP Top News"
    url: "https://rsshub.app/apnews/topics/apf-topnews"
  - name: "Reuters World"
    url: "https://www.reutersagency.com/feed/?best-topics=world"

  # International / geopolitics focused
  - name: "BBC World"
    url: "http://feeds.bbci.co.uk/news/world/rss.xml"
  - name: "Al Jazeera"
    url: "https://www.aljazeera.com/xml/rss/all.xml"
  - name: "Foreign Policy"
    url: "https://foreignpolicy.com/feed/"
  - name: "The Diplomat"
    url: "https://thediplomat.com/feed/"

  # US government / policy
  - name: "State Department"
    url: "https://www.state.gov/rss-feed/press-releases/feed/"

  # Conflict / security
  - name: "Defense One"
    url: "https://www.defenseone.com/rss/"
  - name: "War on the Rocks"
    url: "https://warontherocks.com/feed/"

  # Energy / commodities (non-market)
  - name: "EIA Today in Energy"
    url: "https://www.eia.gov/rss/todayinenergy.xml"

  # Shipping / freight — choke-point and route disruption signals
  - name: "gCaptain"
    url: "https://gcaptain.com/feed/"
  - name: "Splash 247"
    url: "https://splash247.com/feed/"
  - name: "The Loadstar"
    url: "https://theloadstar.com/feed/"
  - name: "Hellenic Shipping News"
    url: "https://www.hellenicshippingnews.com/feed/"
  - name: "JOC.com"
    url: "https://www.joc.com/rss.xml"
  - name: "Marine Insight"
    url: "https://www.marineinsight.com/feed/"

  # Mining / metals — physical supply signals
  - name: "Mining.com"
    url: "https://www.mining.com/feed/"

  # Non-Western news desks — different events surface here first
  - name: "SCMP"
    url: "https://www.scmp.com/rss/91/feed"
  - name: "TASS English"
    url: "https://tass.com/rss/v2.xml"

  # Agriculture — crop and farm production reports
  - name: "FarmProgress"
    url: "https://www.farmprogress.com/rss.xml"

  # Soft commodities — coffee, sugar, etc.
  - name: "Comunicaffe"
    url: "https://www.comunicaffe.com/feed/"
  - name: "World Coffee Portal"
    url: "https://www.worldcoffeeportal.com/rss"
  - name: "Sugar Online"
    url: "https://www.sugaronline.com/rss"

  # Weather — Atlantic hurricane updates (sparse but high-signal in season)
  - name: "NOAA NHC"
    url: "https://www.nhc.noaa.gov/index-at.xml"

# Discord channels
discord_log_channel: "thal-logs"

# Model configuration
models:
  scanner: "claude-haiku-4-5-20251001"  # Fast, cheap headline classification
  analyst: "claude-sonnet-4-6"           # Research, world model, price checks
